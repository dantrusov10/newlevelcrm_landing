<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статья — NewLevel CRM</title>
  <meta name="description" content="Экспертные статьи NewLevel CRM по IT-продажам, ИИ и тендерам." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" id="canonical-link" href="https://nwlvl.ru/blog-post.html" />
  <style>
    body { margin: 0; background: #020509; color: #f0f6ff; font-family: Arial, sans-serif; }
    .w { max-width: 860px; margin: 0 auto; padding: 24px; }
    a { color: #6ea8ff; }
    .meta { color: #8ba8cc; font-size: 14px; margin-bottom: 16px; }
    .content p { line-height: 1.7; color: #d7e5fa; }
    .content h2, .content h3 { line-height: 1.3; }
    .card { border: 1px solid rgba(30,100,255,.25); border-radius: 12px; padding: 16px; margin-top: 20px; background: #08152a; }
    .btn { display: inline-block; margin-top: 16px; padding: 10px 14px; border: 1px solid rgba(30,100,255,.4); border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="w">
    <a href="/blog.html">← Ко всем статьям</a>
    <h1 id="title">Загрузка...</h1>
    <div class="meta" id="meta"></div>
    <div class="content" id="content"></div>

    <div class="card">
      <strong>Комментарии</strong>
      <p style="margin:8px 0 12px">Оставьте обратную связь по статье. Комментарий отправится в редакцию.</p>
      <input id="c-name" type="text" placeholder="Ваше имя" style="width:100%;margin-bottom:8px;padding:10px;border-radius:8px;border:1px solid #284677;background:#061024;color:#fff">
      <textarea id="c-text" placeholder="Комментарий" rows="4" style="width:100%;margin-bottom:8px;padding:10px;border-radius:8px;border:1px solid #284677;background:#061024;color:#fff"></textarea>
      <button id="c-send" style="padding:10px 14px;border:none;border-radius:8px;background:#1e64ff;color:#fff;cursor:pointer">Отправить комментарий</button>
      <div id="c-result" style="margin-top:8px;color:#8ba8cc;font-size:14px"></div>
    </div>

    <a class="btn" href="/#contact">Получить демо NewLevel CRM →</a>
  </div>

  <script>
    const CMS_BASE = 'https://cms-api.nwlvl.ru';
    const params = new URLSearchParams(window.location.search);
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const slugFromPath = pathParts.length >= 2 && pathParts[0] === 'blog' ? decodeURIComponent(pathParts[1]) : '';
    const slug = slugFromPath || params.get('slug');

    function setMeta(title, description, robots) {
      document.title = `${title} — NewLevel CRM`;
      const d = document.querySelector('meta[name="description"]');
      if (d) d.setAttribute('content', description || '');
      const r = document.querySelector('meta[name="robots"]');
      if (r) r.setAttribute('content', robots || 'index,follow');
      const canonical = document.getElementById('canonical-link');
      if (canonical && slug) canonical.href = `https://nwlvl.ru/blog/${encodeURIComponent(slug)}`;
    }

    async function load() {
      if (!slug) {
        document.getElementById('title').textContent = 'Статья не найдена';
        return;
      }
      const filter = encodeURIComponent(`slug="${slug}"&&status="published"`);
      const url = `${CMS_BASE}/api/collections/site_articles/records?filter=${filter}&perPage=1`;
      const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!resp.ok) throw new Error('CMS error');
      const data = await resp.json();
      const item = (data.items || [])[0];
      if (!item) throw new Error('Not found');

      document.getElementById('title').textContent = item.title || 'Без названия';
      document.getElementById('meta').textContent = `${new Date(item.published_at || item.created).toLocaleDateString('ru-RU')} · Блог NewLevel CRM`;
      document.getElementById('content').innerHTML = item.content || '<p>Контент отсутствует.</p>';
      setMeta(item.seo_title || item.title || 'Статья', item.seo_description || item.excerpt || '', item.robots || 'index,follow');
    }

    async function sendComment() {
      const name = document.getElementById('c-name').value.trim();
      const text = document.getElementById('c-text').value.trim();
      const result = document.getElementById('c-result');
      if (!text) { result.textContent = 'Введите комментарий'; return; }
      const btn = document.getElementById('c-send');
      btn.disabled = true;
      btn.textContent = 'Отправка...';
      try {
        const resp = await fetch('/api/blog-comment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, name, text })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Ошибка');
        result.textContent = 'Спасибо! Комментарий отправлен.';
        document.getElementById('c-text').value = '';
      } catch (e) {
        result.textContent = 'Не удалось отправить комментарий. Попробуйте позже.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Отправить комментарий';
      }
    }

    document.getElementById('c-send').addEventListener('click', sendComment);

    load().catch((e) => {
      console.error(e);
      document.getElementById('title').textContent = 'Ошибка загрузки статьи';
      document.getElementById('content').innerHTML = '<p>Попробуйте открыть статью позже.</p>';
    });
  </script>
</body>
</html>
