<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Партнёрам — NewLevel CRM</title>
  <meta name="description" content="Партнерская программа NewLevel CRM для интеграторов, вендоров и дистрибьюторов IT-решений." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Партнёрам — NewLevel CRM" />
  <meta property="og:description" content="Партнерская программа NewLevel CRM для интеграторов, вендоров и дистрибьюторов IT-решений." />
  <meta property="og:url" content="https://nwlvl.ru/partners.html" />
  <meta name="twitter:card" content="summary" />
  <link rel="canonical" href="https://nwlvl.ru/partners.html" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--void:#020509;--surface:#08152a;--rim:rgba(30,100,255,.14);--rim2:rgba(30,100,255,.07);--electric:#1e64ff;--t1:#f0f6ff;--t2:#8ba8cc}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--void);color:var(--t1);font-family:'Onest',sans-serif}
    .w{max-width:1000px;margin:0 auto;padding:0 32px}
    .hero{padding:56px 0 20px}
    .card{background:var(--surface);border:1px solid var(--rim2);border-radius:16px;padding:18px;margin:12px 0}
    h1{font-family:'Unbounded',sans-serif;font-size:clamp(30px,4vw,44px);line-height:1.1}
    p,li{color:#d0e2fa;line-height:1.65}
    ul{padding-left:20px}
    .btn{display:inline-flex;margin-top:12px;padding:10px 14px;border-radius:8px;background:var(--electric);color:#fff;text-decoration:none}
  </style>
</head>
<body>
  <main class="w">
    <section class="hero">
      <a href="/" style="color:var(--t2);text-decoration:none">← На главную</a>
      <h1 style="margin-top:16px">Партнёрам</h1>
      <p style="margin-top:10px;color:var(--t2)">Программа сотрудничества для IT-вендоров, интеграторов и дистрибьюторов.</p>
    </section>
    <article class="card">
      <h2 style="font-family:'Unbounded',sans-serif;font-size:18px;margin-bottom:10px">Форматы партнёрства</h2>
      <ul>
        <li>Реферальная модель и совместные продажи.</li>
        <li>Интеграционное партнерство по API и бизнес-процессам.</li>
        <li>Совместные пилоты и отраслевые кейсы.</li>
      </ul>
      <a class="btn" href="/#contact">Подать заявку на партнёрство</a>
    </article>
  </main>
</body>
</html>
