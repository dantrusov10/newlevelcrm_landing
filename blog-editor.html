<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Публикация статьи — NewLevel CRM</title>
  <style>
    body { margin: 0; background: #020509; color: #f0f6ff; font-family: Arial, sans-serif; }
    .w { max-width: 760px; margin: 0 auto; padding: 24px; }
    input, textarea { width: 100%; background: #08152a; color: #fff; border: 1px solid #284677; border-radius: 8px; padding: 10px; margin-top: 8px; margin-bottom: 14px; }
    button { padding: 10px 14px; border-radius: 8px; border: none; background: #1e64ff; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="w">
    <h1>Опубликовать статью</h1>
    <p>Простой способ ручной публикации в блог.</p>
    <label>Секрет публикации</label>
    <input id="secret" type="password" placeholder="BLOG_EDITOR_SECRET" />
    <label>Заголовок</label>
    <input id="title" />
    <label>Краткое описание (excerpt)</label>
    <textarea id="excerpt" rows="3"></textarea>
    <label>HTML-контент</label>
    <textarea id="content" rows="12" placeholder="<h3>...</h3><p>...</p>"></textarea>
    <label>SEO title</label>
    <input id="seoTitle" />
    <label>SEO description</label>
    <textarea id="seoDescription" rows="2"></textarea>
    <button onclick="publish()">Опубликовать</button>
    <p id="result"></p>
  </div>
  <script>
    async function publish() {
      const payload = {
        secret: document.getElementById('secret').value.trim(),
        title: document.getElementById('title').value.trim(),
        excerpt: document.getElementById('excerpt').value.trim(),
        content: document.getElementById('content').value.trim(),
        seo_title: document.getElementById('seoTitle').value.trim(),
        seo_description: document.getElementById('seoDescription').value.trim()
      };
      const resp = await fetch('/api/blog-publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Ошибка');
      document.getElementById('result').innerHTML = `Опубликовано: <a href="/blog/${encodeURIComponent(data.slug)}" target="_blank" rel="noopener">${data.slug}</a>`;
    }
  </script>
</body>
</html>
